<!DOCTYPE html>
<html>
<head>
    <title>Notifications Demo</title>
    <!-- SockJS + STOMP from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        #status { padding: 8px 14px; border-radius: 6px; display: inline-block; margin-bottom: 20px; }
        .connected { background: #e1f5ee; color: #085041; }
        .disconnected { background: #fcebeb; color: #791f1f; }
        .notification { padding: 12px 16px; border: 1px solid #e0e0e0;
                        border-radius: 8px; margin-bottom: 10px; }
        .INFO    { border-left: 4px solid #378add; }
        .SUCCESS { border-left: 4px solid #1d9e75; }
        .WARNING { border-left: 4px solid #ef9f27; }
        h4 { margin: 0 0 4px; }
        p  { margin: 0; color: #555; font-size: 14px; }
    </style>
</head>
<body>
    <h2>Real-time Notifications</h2>
    <div id="status" class="disconnected">Disconnected</div>
    <div id="notifications"></div>

    <script>
        const statusEl = document.getElementById('status');
        const notifEl  = document.getElementById('notifications');

        const client = new StompJs.Client({
            // SockJS as the transport (handles fallback automatically)
            webSocketFactory: () => new SockJS('/ws'),

            onConnect: () => {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connected';

                // Subscribe to the broadcast channel
                client.subscribe('/topic/notifications', (message) => {
                    const data = JSON.parse(message.body);
                    showNotification(data);
                });
            },

            onDisconnect: () => {
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'disconnected';
            },

            reconnectDelay: 5000   // auto-reconnect after 5 seconds
        });

        client.activate();  // open the connection

        function showNotification(data) {
            const div = document.createElement('div');
            div.className = `notification ${data.type}`;
            div.innerHTML = `<h4>${data.title}</h4><p>${data.body}</p>`;
            notifEl.prepend(div);  // newest at top
        }
    </script>
</body>
